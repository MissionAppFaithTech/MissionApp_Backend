services:
  postgres:
    env_file: .env
    image: postgres:13.22-alpine3.21@sha256:07b1bc17380637c18bfc23470dad5bead835fe3c1d02ae5a902fdcdf9e592ee7
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres}
    restart: on-failure:5
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # networks:
    #   - app-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    env_file: .env
    image: redis:7.2.11-alpine3.21@sha256:b19a2cb55412c26e0c3725011ac04397eba5cb0d7f090f739cbbce8dc97f8e60
    container_name: ${REDIS_CONTAINER_NAME:-redis}
    restart: on-failure:5
    command: ["redis-server", "/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - ./redis.conf:/redis.conf
      - redis_data:/data
    # networks:
    #   - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  elasticsearch:
    env_file: .env
    image: elasticsearch:9.1.5@sha256:9dac882b67afe5161f8988a7ede0e9890145182af83e4e1d4d10631c2f66656f
    container_name: ${ELASTICSEARCH_CONTAINER_NAME:-elasticsearch}
    environment:
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms${ES_JAVA_XMS:-2g} -Xmx${ES_JAVA_XMX:-2g}
      - xpack.security.enabled=false            # NOTE: Alterar este parâmetro para true em produção
      - xpack.security.http.ssl.enabled=false   # NOTE: Alterar este parâmetro para true em produção
    ports:
      - ${ELASTICSEARCH_PORT:-9200}:9200
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    # networks:
    #   - app-network
    healthcheck:
      test: ["CMD", "curl", "-s", "-f", "-u", "${ELASTIC_USERNAME}:${ELASTIC_PASSWORD}", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


