name: Lint and Build

on:
  push:
    branches: ['dev']
  pull_request:
    branches: '**'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run ci:lint

      - name: Run Formatter
        run: npm run ci:format

      - name: Build
        run:
          npm run ci:build
